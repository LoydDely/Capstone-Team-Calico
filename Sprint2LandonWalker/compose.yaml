services:
  bookstack_db:
    image: mariadb:11
    container_name: bookstack-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: bookstack
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: bookstackpass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - bookstack_db:/var/lib/mysql
    networks:
      - appnet

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      - bookstack_db
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      APP_KEY: base64:fyM+ejkrb+xjVmHDEnqlwJoDgHm86eCtBIdHU871r5w=
      APP_URL: http://localhost:8000
      DB_HOST: bookstack_db
      DB_DATABASE: bookstack
      DB_USERNAME: bookstack
      DB_PASSWORD: bookstackpass
    ports:
      - "8000:80"
    volumes:
      - bookstack_config:/config
    networks:
      - appnet

  matomo_db:
    image: mariadb:11
    container_name: matomo-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: matomopass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - matomo_db:/var/lib/mysql
    networks:
      - appnet

  matomo:
    image: matomo:latest
    container_name: matomo
    restart: unless-stopped
    depends_on:
      - matomo_db
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomopass
      MATOMO_DATABASE_DBNAME: matomo
    ports:
      - "8080:80"
    volumes:
      - matomo_data:/var/www/html
    networks:
      - appnet

volumes:
  bookstack_db:
  bookstack_config:
  matomo_db:
  matomo_data:

networks:
  appnet:
    driver: bridge
