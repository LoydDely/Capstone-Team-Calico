services:
  bookstack_db:
    image: mariadb:11
    container_name: bookstack_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: bookstack
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: bookstackpass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - bookstack_db_data:/var/lib/mysql
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      bookstack_db:
        condition: service_healthy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      APP_KEY: base64:fyM+ejkrb+xjVmHDEnqlwJoDgHm86eCtBIdHU871r5w=
      APP_URL: http://localhost:8000
      ALLOWED_PROXIES: 0.0.0.0/0
      DB_HOST: bookstack_db
      DB_DATABASE: bookstack
      DB_USERNAME: bookstack
      DB_PASSWORD: bookstackpass
    ports:
      - "8000:80"
    volumes:
      - bookstack_config:/config
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/login"]
      interval: 15s
      timeout: 10s
      retries: 5

  matomo_db:
    image: mariadb:11
    container_name: matomo-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: matomopass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - matomo_db_data:/var/lib/mysql
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  matomo:
    image: matomo:latest
    container_name: matomo
    restart: unless-stopped
    depends_on:
      matomo_db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomopass
      MATOMO_DATABASE_DBNAME: matomo
    ports:
      - "8080:80"
    volumes:
      - matomo_data:/var/www/html
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 10s
      retries: 5
   
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    depends_on:
      bookstack:
        condition: service_healthy
    networks:
      - appnet
    ports:
      - "4444:4444"
      - "7900:7900"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5
   
  traffic-generator:
    build: ./traffic_generator
    extra_hosts:
      - "localhost:host-gateway"
    container_name: traffic-generator
    depends_on:
      selenium:
        condition: service_healthy
      bookstack:
        condition: service_healthy
    restart: always
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  bookstack_db_data:
  bookstack_config:
  matomo_db_data:
  matomo_data:
