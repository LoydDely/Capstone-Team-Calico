services:
  bookstack_db:
    image: mariadb:11
    container_name: bookstack-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: bookstack
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: bookstackpass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - bookstack_db:/var/lib/mysql
    networks:
      - appnet

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      - bookstack_db
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      APP_KEY: base64:fyM+ejkrb+xjVmHDEnqlwJoDgHm86eCtBIdHU871r5w=
      APP_URL: http://localhost:8000
      DB_HOST: bookstack_db
      DB_DATABASE: bookstack
      DB_USERNAME: bookstack
      DB_PASSWORD: bookstackpass
    ports:
      - "8000:80"
    volumes:
      - bookstack_config:/config
    networks:
      - appnet

  umami_db:
    image: postgres:15
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umamipass
    volumes:
      - umami_db:/var/lib/postgresql/data
    networks:
      - appnet

  umami:
    image: umamisoftware/umami:cloud-3119c14f
    container_name: umami
    restart: unless-stopped
    depends_on:
      - umami_db
    environment:
      DATABASE_URL: postgresql://umami:umamipass@umami_db:5432/umami
      HASH_SALT: uwGITmMgReVwCiknzPCBOJJyj
    ports:
      - "3000:3000"
    networks:
      - appnet


volumes:
  bookstack_db:
  bookstack_config:
  umami_db:

networks:
  appnet:
    driver: bridge
